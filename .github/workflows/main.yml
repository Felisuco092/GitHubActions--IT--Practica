name: Java CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permissions for mvn
        run: chmod +x mvnw

      - name: Compile with Maven
        run: ./mvnw compile --no-transfer-progress

      - name: Verify with Maven
        run: ./mvnw verify --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/site/jacoco/jacoco.csv

  report:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: target/site/jacoco/
      - name: Generate JaCoCo Badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: target/site/jacoco/jacoco.csv
      - name: Commit JaCoCo Badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit-message: "Update JaCoCo coverage badge [skip ci]"
          files: |
            .github/badges/jacoco.svg
            .github/badges/branches.svg